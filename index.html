<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-DYS49TX66K'); // ←ここを自分のGA4測定IDに変更
</script>

<title>LP</title>

<style>
body {
  margin: 0;
  background: #000;
}
img {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
const set = params.get("set") || "a"; // デフォルトa

const total = 14; // 画像枚数
const app = document.getElementById("app");

for (let i = 1; i <= total; i++) {
  const img = document.createElement("img");
  img.src = `./img/${set}/${i}.webp`;
  img.loading = "lazy";
  app.appendChild(img);
}

// 来場イベント（2秒後に送信して誤クリック防止）
setTimeout(() => {
  gtag('event', 'visit_complete', {
    event_category: 'conversion', // カテゴリ
    event_label: set          // a/b/c/d パターン
  });
}, 2000);
</script>

</body>
</html>
