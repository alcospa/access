<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DYS49TX66K"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-DYS49TX66K');
</script>

<title>LP</title>

<style>
body {
  margin: 0;
  background: #000;
}
img {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
// URLパラメータ取得
const params = new URLSearchParams(location.search);
const set = params.get("set") || "a"; // デフォルトa

// セットごとに画像枚数を設定
let total;
if(set === "a" || set === "b") total = 14;
else if(set === "c" || set === "d") total = 13;

const app = document.getElementById("app");

// 画像を追加
for (let i = 1; i <= total; i++) {
  const img = document.createElement("img");
  img.src = `./img/${set}/${i}.webp`;
  img.loading = "lazy";
  app.appendChild(img);
}

// 来場イベント（1秒後に送信）
setTimeout(() => {
  gtag('event', 'visit_complete', {
    event_category: 'conversion',
    event_label: set
  });
}, 1000);
</script>

</body>
</html>
