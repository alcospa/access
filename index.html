<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DYS49TX66K"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-DYS49TX66K');
</script>

<title>LP</title>

<style>
body {
  margin: 0;
  background: #000;
}
img {
  width: 100%;
  height: auto;
  display: block;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
// URLパラメータ取得
const params = new URLSearchParams(location.search);
let set = params.get("set");

// 不正値対策（a～d以外は弾く）
if (!["a","b","c","d"].includes(set)) {
  set = "unknown";
}

// セットごとに画像枚数を設定
let total = 0;
if(set === "a" || set === "b") total = 14;
else if(set === "c" || set === "d") total = 13;

// 画像表示
const app = document.getElementById("app");

for (let i = 1; i <= total; i++) {
  const img = document.createElement("img");
  img.src = `https://alcospa.github.io/access/img/${set}/${i}.webp`;
  img.loading = "lazy";
  app.appendChild(img);
}

// ==========================
// 3秒閲覧イベント（重複防止）
// ==========================

// setごとに1回だけ発火
if (!localStorage.getItem("sent_" + set)) {

  setTimeout(() => {
    gtag('event', 'view_3sec', {
      conversion_set: set
    });

    localStorage.setItem("sent_" + set, "true");

  }, 3000);
}

</script>

</body>
</html>
